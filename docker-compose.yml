# Define services (containers) that make up your application
services:
  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blog
    volumes:
      # Persist data: mongo data survives container restarts
      - mongodb_data:/data/db
    networks:
      - devops_network
    # Health check: tells Docker when service is ready
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Node.js Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      # Load from .env file in server directory
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/blog
      JWT_SECRET: ${JWT_SECRET:-alpha}
      CORS_ORIGIN: http://localhost:3000
    # Only start backend after mongodb is healthy
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - devops_network
    # Restart policy: if container crashes, restart automatically
    restart: unless-stopped
    # Keep container running (useful for development)
    stdin_open: true
    tty: true

  # React Frontend Service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # Frontend talks to backend via container name (not localhost)
      REACT_APP_API_URL: http://backend:5000
    # Start frontend only after backend is ready
    depends_on:
      - backend
    networks:
      - devops_network
    restart: unless-stopped
    stdin_open: true
    tty: true

# Named volumes (persist data across container restarts)
volumes:
  mongodb_data:
    driver: local

# Custom network (so all containers can communicate)
networks:
  devops_network:
    driver: bridge
